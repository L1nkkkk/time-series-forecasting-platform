<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>时间序列平台 Demo Dashboard</title>
    <link rel="stylesheet" href="/ui/static/styles.css" />
    <script src="/ui/static/app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow" data-i18n="eyebrow">本地演示</p>
        <h1 data-i18n="appTitle">时间序列平台 Dashboard</h1>
      </div>
      <div class="topbar-actions">
        <button id="language-toggle" class="secondary" type="button">English</button>
        <button id="refresh-overview" type="button" data-i18n="refresh">刷新</button>
      </div>
    </header>

    <main>
      <section class="section" aria-labelledby="overview-title">
        <div class="section-heading">
          <h2 id="overview-title" data-i18n="overviewTitle">概览</h2>
          <span id="overview-status" class="status" data-i18n="loading">加载中...</span>
        </div>
        <div id="overview-grid" class="metric-grid"></div>
        <div id="overview-error" class="error" role="alert"></div>
      </section>

      <section class="section" aria-labelledby="train-title">
        <div class="section-heading">
          <h2 id="train-title" data-i18n="trainTitle">训练演示</h2>
          <span id="train-status" class="status" data-i18n="idle">空闲</span>
        </div>
        <div class="actions">
          <button type="button" data-train-demo="simple_forecast">Run simple_forecast</button>
          <button type="button" data-train-demo="csv_forecast">Run csv_forecast</button>
          <button type="button" data-train-demo="csv_feature_forecast">
            Run csv_feature_forecast
          </button>
        </div>
        <div id="train-output" class="output"></div>
      </section>

      <section class="section" aria-labelledby="compare-title">
        <div class="section-heading">
          <h2 id="compare-title" data-i18n="compareTitle">对比演示</h2>
          <span id="compare-status" class="status" data-i18n="idle">空闲</span>
        </div>
        <div class="actions">
          <button type="button" data-compare-demo="compare_forecast">Run compare_forecast</button>
          <button type="button" data-compare-demo="compare_model_zoo">
            Run compare_model_zoo
          </button>
          <button type="button" data-compare-demo="compare_feature_forecast">
            Run compare_feature_forecast
          </button>
        </div>
        <div id="compare-output" class="output"></div>
      </section>

      <section class="section" aria-labelledby="experiments-title">
        <div class="section-heading">
          <h2 id="experiments-title" data-i18n="experimentsTitle">实验</h2>
          <button id="refresh-experiments" type="button" data-i18n="refreshExperiments">
            刷新实验
          </button>
        </div>
        <div id="experiments-output" class="output"></div>
      </section>

      <section class="section" aria-labelledby="jobs-title">
        <div class="section-heading">
          <h2 id="jobs-title" data-i18n="jobsTitle">任务</h2>
          <button id="refresh-jobs" type="button" data-i18n="refreshJobs">刷新任务</button>
        </div>
        <div class="form-row">
          <label for="job-id">job_id</label>
          <input id="job-id" type="text" autocomplete="off" />
          <button id="load-job" type="button" data-i18n="loadJob">加载任务</button>
          <button id="load-job-result" type="button" data-i18n="loadJobResult">
            加载任务结果
          </button>
          <button id="load-job-logs" type="button" data-i18n="loadJobLogs">
            加载任务日志
          </button>
        </div>
        <div id="jobs-output" class="output"></div>
      </section>

      <section class="section" aria-labelledby="artifacts-title">
        <div class="section-heading">
          <h2 id="artifacts-title" data-i18n="artifactsTitle">产物 / 排行榜预览</h2>
        </div>
        <div class="form-row">
          <label for="artifact-experiment">experiment_name</label>
          <input id="artifact-experiment" type="text" autocomplete="off" />
          <label for="artifact-run">run_id</label>
          <input id="artifact-run" type="text" value="latest" autocomplete="off" />
          <button id="load-results" type="button" data-i18n="loadResults">加载结果</button>
          <button id="load-leaderboard" type="button" data-i18n="loadLeaderboard">
            加载排行榜
          </button>
          <button id="load-artifacts" type="button" data-i18n="loadArtifacts">加载产物</button>
        </div>
        <div id="artifact-output" class="output"></div>
      </section>
    </main>
  </body>
</html>
