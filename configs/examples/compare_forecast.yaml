experiment:
  name: compare_forecast
  output_dir: runs
  seed: 42
  overwrite: true

data:
  name: csv
  input_len: 8
  output_len: 2
  batch_size: 8
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  scaler:
    name: standard
  params:
    path: tests/fixtures/tiny_series.csv
    timestamp_col: timestamp
    target_cols: [value]
    missing_policy: error
    sort_by_time: true

models:
  - name: naive
  - name: moving_average
    params:
      window_size: 4
  - name: seasonal_naive
    params:
      season_length: 7
  - name: linear
  - name: mlp
    params:
      hidden_sizes: [16]
      dropout: 0.0

training:
  epochs: 1
  learning_rate: 0.01
  device: cpu
  optimizer: adam
  loss: mse
  checkpoint_every: 1

evaluation:
  metrics: [mae, mse, rmse, wape]
  include_scaled_metrics: false

primary_metric: mae
continue_on_error: true
