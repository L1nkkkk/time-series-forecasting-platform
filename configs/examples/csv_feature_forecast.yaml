experiment:
  name: csv_feature_forecast
  output_dir: runs
  seed: 42
  overwrite: true

data:
  name: csv
  input_len: 4
  output_len: 2
  batch_size: 4
  train_ratio: 0.5
  val_ratio: 0.25
  test_ratio: 0.25
  scaler:
    name: standard
  params:
    path: tests/fixtures/tiny_series_with_features.csv
    timestamp_col: timestamp
    target_cols: [value]
    feature_cols: [temperature, holiday]
    missing_policy: error
    sort_by_time: true

model:
  name: linear

training:
  epochs: 1
  learning_rate: 0.01
  device: cpu
  optimizer: adam
  loss: mse
  checkpoint_every: 1

evaluation:
  metrics: [mae, mse, rmse, wape]
  include_scaled_metrics: false
