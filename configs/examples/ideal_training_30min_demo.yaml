experiment:
  name: ideal_training_30min_demo
  output_dir: runs
  seed: 42
  overwrite: true

data:
  name: csv
  input_len: 48
  output_len: 12
  batch_size: 64
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  scaler:
    name: standard
  params:
    path: data/external/etth1/v1/ETTh1.csv
    timestamp_col: date
    target_cols: [OT]
    feature_cols: [HUFL, HULL, MUFL, MULL, LUFL, LULL]
    missing_policy: error
    sort_by_time: true

model:
  name: dlinear
  params:
    kernel_size: 7

training:
  epochs: 60
  learning_rate: 0.001
  device: cpu
  optimizer: adam
  loss: mse
  checkpoint_every: 10
  num_workers: 0
  gradient_clip_norm: 1.0
  best_checkpoint_metric: mae
  target_duration_minutes: 30
  early_stopping:
    enabled: false
    patience: 5
    min_delta: 0.0
    mode: min
  lr_scheduler:
    name: cosine
    eta_min: 0.0001

evaluation:
  metrics: [mae, mse, rmse, wape]
  include_scaled_metrics: false
