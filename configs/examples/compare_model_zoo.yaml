experiment:
  name: compare_model_zoo
  output_dir: runs
  seed: 42
  overwrite: true

data:
  name: synthetic
  input_len: 4
  output_len: 2
  batch_size: 4
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  scaler:
    name: standard
  params:
    length: 48
    num_features: 1
    noise_std: 0.0

models:
  - name: naive
  - name: moving_average
    params:
      window_size: 2
  - name: seasonal_naive
    params:
      season_length: 4
  - name: linear
  - name: dlinear
    params:
      kernel_size: 3
  - name: nlinear
  - name: patchtst
    params:
      patch_len: 2
      stride: 1
      d_model: 16
      num_heads: 4
      num_layers: 1
      dim_feedforward: 32
      dropout: 0.0
  - name: mlp
    params:
      hidden_sizes: [8]
      dropout: 0.0
  - name: nbeats
    params:
      hidden_size: 16
      num_blocks: 2
      num_layers: 2
      dropout: 0.0
  - name: rnn
    params:
      hidden_size: 8
      num_layers: 1
      dropout: 0.0
      bidirectional: false
  - name: gru
    params:
      hidden_size: 8
      num_layers: 1
      dropout: 0.0
      bidirectional: false
  - name: lstm
    params:
      hidden_size: 8
      num_layers: 1
      dropout: 0.0
      bidirectional: false
  - name: tcn
    params:
      hidden_channels: 8
      num_layers: 2
      kernel_size: 3
      dropout: 0.0
  - name: transformer
    params:
      d_model: 16
      num_heads: 4
      num_layers: 1
      dim_feedforward: 32
      dropout: 0.0

training:
  epochs: 1
  learning_rate: 0.01
  device: cpu
  optimizer: adam
  loss: mse
  checkpoint_every: 1

evaluation:
  metrics: [mae, mse, rmse, wape]
  include_scaled_metrics: false

primary_metric: mae
continue_on_error: true
